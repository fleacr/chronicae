<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pain Log | Chronicae</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Font: Manrope -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#f7ddd8",
                    "secondary": "#6d5a56",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#fffbff",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#f7ddd8",
                    "tertiary-container": "#bb5636",
                    "surface-container-highest": "#e7e1df",
                    "primary-fixed-dim": "#ffb5a0",
                    "outline": "#8f7067",
                    "on-secondary-fixed": "#261815",
                    "on-secondary": "#ffffff",
                    "surface-container-high": "#ede7e5",
                    "error": "#ba1a1a",
                    "on-secondary-container": "#73605c",
                    "inverse-on-surface": "#f5efed",
                    "primary-container": "#d63c05",
                    "surface-variant": "#e7e1df",
                    "on-primary-container": "#fffbff",
                    "inverse-primary": "#ffb5a0",
                    "surface-tint": "#b02e00",
                    "primary": "#ac2d00",
                    "surface": "#fef8f6",
                    "on-error-container": "#93000a",
                    "surface-dim": "#ded9d7",
                    "primary-fixed": "#ffdbd1",
                    "tertiary": "#9c3f20",
                    "background": "#fef8f6",
                    "on-error": "#ffffff",
                    "on-background": "#1d1b1a",
                    "on-surface": "#1d1b1a",
                    "outline-variant": "#e4beb4",
                    "surface-bright": "#fef8f6",
                    "inverse-surface": "#32302f",
                    "on-tertiary-fixed-variant": "#7f2a0d",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#f2edeb",
                    "on-tertiary-fixed": "#3a0b00",
                    "on-primary-fixed-variant": "#872100",
                    "tertiary-fixed": "#ffdbd0",
                    "on-primary-fixed": "#3b0900",
                    "surface-container-low": "#f8f2f0",
                    "on-surface-variant": "#5b4039",
                    "tertiary-fixed-dim": "#ffb59e",
                    "secondary-fixed-dim": "#dac1bc",
                    "on-secondary-fixed-variant": "#54433f",
                    "on-primary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .pain-gradient-bg {
            background: linear-gradient(90deg, #ffdbd1 0%, #ac2d00 100%);
        }
        body { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar -->
<header class="bg-stone-50/80 dark:bg-stone-950/80 backdrop-blur-xl shadow-[0_8px_24px_rgba(29,27,26,0.06)] fixed top-0 w-full z-50 flex items-center justify-between px-6 py-4">
<button class="text-orange-800 dark:text-orange-500 active:scale-95 transition-transform duration-200 p-2 -ml-2">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-manrope font-bold tracking-tight text-lg text-orange-900 dark:text-orange-100">Pain Log</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto">
<!-- Hero Question -->
<section class="mb-12">
<h2 class="text-3xl font-bold tracking-tight text-on-surface leading-tight mb-2">How is your pain today?</h2>
<p class="text-on-surface-variant/80 font-medium">Tracking your sensation helps identify patterns over time.</p>
</section>
<!-- Pain Level Selector -->
<section class="mb-12">
<div class="flex justify-between items-end mb-4 px-1">
<span class="text-sm font-semibold tracking-wider text-on-surface-variant uppercase">Minimal</span>
<span class="text-sm font-semibold tracking-wider text-on-surface-variant uppercase">Extreme</span>
</div>
<div class="grid grid-cols-5 gap-3">
<!-- Scale 1-10 -->
<button class="aspect-square flex items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-lg active:scale-90 transition-all duration-200 hover:bg-orange-50">1</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-lg active:scale-90 transition-all duration-200 hover:bg-orange-50">2</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-lg active:scale-90 transition-all duration-200 hover:bg-orange-50">3</button>
<!-- Selected State Example (6) -->
<button class="aspect-square flex items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-lg active:scale-90 transition-all duration-200 hover:bg-orange-50">4</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-lg active:scale-90 transition-all duration-200 hover:bg-orange-50">5</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-primary text-on-primary shadow-lg shadow-primary/20 font-bold text-xl active:scale-90 transition-all duration-200 ring-4 ring-primary-fixed">6</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-lg active:scale-90 transition-all duration-200 hover:bg-orange-50">7</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-lg active:scale-90 transition-all duration-200 hover:bg-orange-50">8</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-lg active:scale-90 transition-all duration-200 hover:bg-orange-50">9</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant font-bold text-lg active:scale-90 transition-all duration-200 hover:bg-orange-50">10</button>
</div>
<!-- Gradient Reference Track -->
<div class="mt-6 h-2 w-full rounded-full pain-gradient-bg opacity-30"></div>
</section>
<!-- Context Input -->
<section class="mb-12">
<label class="block text-sm font-bold tracking-wider text-on-surface-variant uppercase mb-4 px-1">Describe the sensation</label>
<div class="relative">
<textarea class="w-full bg-surface-container-low border-none rounded-3xl p-6 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary-fixed transition-all duration-300 resize-none" placeholder="e.g. Headache, hip pain, full body discomfort, morning stiffness..." rows="5"></textarea>
<div class="absolute bottom-4 right-6 text-on-surface-variant/30">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
</div>
</div>
</section>
<!-- Dynamic Context Chips -->
<section class="mb-12">
<p class="text-xs font-bold tracking-widest text-on-surface-variant/50 uppercase mb-3 px-1">Quick Tags</p>
<div class="flex flex-wrap gap-2">
<span class="px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-primary-fixed hover:text-on-primary-fixed transition-colors cursor-pointer">Sharp</span>
<span class="px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-primary-fixed hover:text-on-primary-fixed transition-colors cursor-pointer">Dull Ache</span>
<span class="px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-primary-fixed hover:text-on-primary-fixed transition-colors cursor-pointer">Throbbing</span>
<span class="px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-primary-fixed hover:text-on-primary-fixed transition-colors cursor-pointer">Radiating</span>
</div>
</section>
<!-- Save Button Section -->
<section class="fixed bottom-0 left-0 w-full px-6 pb-10 pt-6 bg-gradient-to-t from-background via-background to-transparent pointer-events-none">
<button class="pointer-events-auto w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold text-lg rounded-full shadow-[0_8px_24px_rgba(172,45,0,0.3)] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2">
<span>Save Entry</span>
<span class="material-symbols-outlined text-xl" data-icon="done_all">done_all</span>
</button>
</section>
</main>
<!-- Decorative Element: Radiant Pulse Background Image -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none opacity-20">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary-fixed blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 -left-24 w-64 h-64 bg-tertiary-fixed blur-[100px] rounded-full opacity-50"></div>
</div>
<!-- BottomNavBar (Suppressed for focused entry, but template placeholder exists) -->
<!-- Not rendered as per Task rules for Focused/Transactional screens -->
</body></html>
